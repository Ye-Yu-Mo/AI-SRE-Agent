name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Vet
        working-directory: agent
        run: go vet ./...
      - name: Test
        working-directory: agent
        run: go test -v -count=1 ./...

  build:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build
        working-directory: agent
        id: build
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            OUT=ai-server-agent
          else
            OUT=ai-server-agent-${{ matrix.arch }}
          fi
          GOOS=linux GOARCH=${{ matrix.arch }} go build -ldflags "-X main.Version=${VERSION}" -o ${OUT} ./cmd/agent/
          ls -lh ${OUT}
          echo "binary=${OUT}" >> $GITHUB_OUTPUT
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ai-server-agent-${{ matrix.arch }}
          path: agent/${{ steps.build.outputs.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ai-server-agent-amd64/ai-server-agent
            ai-server-agent-arm64/ai-server-agent-arm64
          generate_release_notes: true
