name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Vet
        working-directory: agent
        run: go vet ./...
      - name: Test
        working-directory: agent
        run: go test -v -count=1 ./...

  build:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build
        working-directory: agent
        run: |
          GOOS=linux GOARCH=${{ matrix.arch }} go build -o ai-server-agent-${{ matrix.arch }} ./cmd/agent/
          ls -lh ai-server-agent-${{ matrix.arch }}
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ai-server-agent-${{ matrix.arch }}
          path: agent/ai-server-agent-${{ matrix.arch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ai-server-agent-amd64/ai-server-agent-amd64
            ai-server-agent-arm64/ai-server-agent-arm64
          generate_release_notes: true
