<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Server Agent</title>
<style>
  :root {
    --bg: #0d1117; --card: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --red: #f85149; --yellow: #d2991d;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); line-height:1.5; }
  .container { max-width:1200px; margin:0 auto; padding:24px; }
  header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; padding-bottom:16px; border-bottom:1px solid var(--border); }
  h1 { font-size:20px; font-weight:600; }
  .badge { font-size:12px; color:var(--muted); }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:16px; margin-bottom:24px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:16px; }
  .card h3 { font-size:13px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; }
  .card .value { font-size:28px; font-weight:600; }
  .card .sub { font-size:12px; color:var(--muted); margin-top:4px; }
  table { width:100%; border-collapse:collapse; margin-bottom:24px; }
  th { text-align:left; font-size:12px; color:var(--muted); text-transform:uppercase; padding:8px 12px; border-bottom:1px solid var(--border); }
  td { padding:8px 12px; border-bottom:1px solid var(--border); font-size:14px; }
  .status-ok { color:var(--green); }
  .status-warn { color:var(--yellow); }
  .status-err { color:var(--red); }
  .section-title { font-size:16px; font-weight:600; margin-bottom:12px; }
  .error-msg { color:var(--red); padding:16px; background:var(--card); border-radius:8px; }
  @media(max-width:600px){ .grid{grid-template-columns:1fr;} .container{padding:12px;} }
</style>
</head>
<body>
<div class="container">
  <header>
    <div><h1>🖥 AI Server Agent</h1></div>
    <div class="badge" id="version">loading...</div>
  </header>
  <div id="app">
    <div class="error-msg" id="error" style="display:none"></div>

    <div class="section-title">📊 Resources</div>
    <div class="grid">
      <div class="card"><h3>CPU</h3><div class="value" id="cpu">--</div><div class="sub" id="cpu-sub"></div></div>
      <div class="card"><h3>Memory</h3><div class="value" id="mem">--</div><div class="sub" id="mem-sub"></div></div>
      <div class="card"><h3>Disk</h3><div class="value" id="disk">--</div><div class="sub" id="disk-sub"></div></div>
      <div class="card"><h3>Status</h3><div class="value" id="health">--</div></div>
    </div>

    <div class="section-title">🐳 Containers</div>
    <table><thead><tr><th>Name</th><th>Status</th><th>Image</th><th>Ports</th></tr></thead>
    <tbody id="containers"><tr><td colspan="4" style="color:var(--muted)">loading...</td></tr></tbody></table>

    <div class="section-title">📋 Audit Log</div>
    <table><thead><tr><th>Time</th><th>Action</th><th>Target</th><th>Result</th></tr></thead>
    <tbody id="audit"><tr><td colspan="4" style="color:var(--muted)">loading...</td></tr></tbody></table>
  </div>
</div>

<script>
const API = '';
async function get(path) {
  try {
    const r = await fetch(API+path);
    if (!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  } catch(e) { throw e; }
}

function fmtBytes(b) { if(!b)return '0 B'; const u=['B','KB','MB','GB']; const i=Math.floor(Math.log(b)/Math.log(1024)); return (b/Math.pow(1024,i)).toFixed(1)+' '+u[i]; }

async function load() {
  try {
    const [inspect, containers, audit, version] = await Promise.all([
      get('/api/v1/inspect'), get('/api/v1/docker/containers'), get('/api/v1/audit?server_id=srv'), get('/api/v1/agent/version')
    ]);
    document.getElementById('version').textContent = 'v'+version.version+' | '+version.server_id;
    document.getElementById('cpu').textContent = (inspect.cpu_percent||0)+'%';
    document.getElementById('cpu-sub').textContent = (inspect.cpu_model||'')+' ('+(inspect.cpu_cores||0)+' cores)';
    document.getElementById('mem').textContent = (inspect.memory_percent||0)+'%';
    document.getElementById('mem-sub').textContent = fmtBytes(inspect.memory_used)+' / '+fmtBytes(inspect.memory_total);
    document.getElementById('disk').textContent = (inspect.disk_percent||0)+'%';
    document.getElementById('disk-sub').textContent = fmtBytes(inspect.disk_used)+' / '+fmtBytes(inspect.disk_total);
    document.getElementById('health').innerHTML = '<span class="status-ok">● healthy</span>';
    const ctn = (containers.containers||[]);
    document.getElementById('containers').innerHTML = ctn.length ? ctn.map(c =>
      `<tr><td>${c.name}</td><td>${c.status}</td><td>${c.image||'-'}</td><td>${(c.ports||[]).join(', ')||'-'}</td></tr>`
    ).join('') : '<tr><td colspan="4" style="color:var(--muted)">no containers</td></tr>';
    const events = (audit.events||[]).slice(0,10);
    document.getElementById('audit').innerHTML = events.length ? events.map(e =>
      `<tr><td>${(e.created_at||'').slice(0,19)}</td><td>${e.action_type}</td><td>${e.target}</td><td>${e.result}</td></tr>`
    ).join('') : '<tr><td colspan="4" style="color:var(--muted)">no audit records</td></tr>';
  } catch(e) {
    document.getElementById('error').style.display='block';
    document.getElementById('error').textContent = 'Failed to load: '+e.message+' (check agent connectivity)';
  }
}
load();
</script>
</body>
</html>
